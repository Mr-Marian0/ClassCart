<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details - ClassCart</title>
    <link rel="stylesheet" href="assets/css/header.css" />
    <link rel="stylesheet" href="assets/css/footer.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/product.css" />
  </head>
  <body>
    <!---------------------- Header Placeholder ---------------------->
    <div class="main-header" id="header-placeholder"></div>

    <!---------------------------- Product Details Section ----------------------------->
    <main class="product-page">
      <div class="card-wrapper">
        <div class="card">
          <!-- Left: Images -->
          <div class="product-imgs">
            <div class="img-display">
              <div class="img-showcase" id="img-showcase"></div>
            </div>
            <div class="img-select" id="img-select"></div>
          </div>

          <!-- Right: Details -->
          <div class="product-content">
            <h1 class="product-title" id="product-title">Loading...</h1>
            <div class="product-rating" id="product-rating"></div>

            <div class="product-price">
              <p class="new-price">Price</p>
              <p class="price-value" id="product-price">₱0</p>
            </div>

            <div class="product-detail">
              <h2>About this item</h2>
              <ul>
                <li>Category: <span id="product-category">—</span></li>
                <li>Availability: <span>In Stock</span></li>
                <li>Shipping: <span>Nationwide</span></li>
                <li>Shipping Fee: <span>Free</span></li>
              </ul>
            </div>

            <div class="purchase-info">
              <input type="number" id="product-quantity" min="1" max="100" value="1" />
              <button type="button" class="btn" id="add-to-cart-btn">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!------------------------- Footer Placeholder --------------------------->
    <div class="footer" id="footer-placeholder"></div>

    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/product.js"></script>
  </body>
</html>
