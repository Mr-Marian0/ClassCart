<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - ClassCart</title>
    <link rel="stylesheet" href="assets/css/header.css" />
    <link rel="stylesheet" href="assets/css/footer.css" />
    <link rel="stylesheet" href="assets/css/checkout.css" />
  </head>
  <body>
    <!---------------------- Header Placeholder ---------------------->
    <div class="main-header" id="header-placeholder"></div>

    <main class="checkout-page">
      <!-- Left: Delivery Form -->
      <div class="checkout-form">
        <h2>Delivery Information</h2>

        <div class="form-group">
          <label for="checkout-name">Full Name</label>
          <input type="text" id="checkout-name" placeholder="Juan Dela Cruz" />
        </div>

        <div class="form-group">
          <label for="checkout-address">Address</label>
          <input type="text" id="checkout-address" placeholder="123 Rizal Street" />
        </div>

        <div class="form-group">
          <label for="checkout-city">City</label>
          <input type="text" id="checkout-city" placeholder="Manila" />
        </div>

        <div class="form-group">
          <label for="checkout-province">Province</label>
          <input type="text" id="checkout-province" placeholder="Metro Manila" />
        </div>

        <div class="form-group">
          <label for="checkout-zip">ZIP Code</label>
          <input type="text" id="checkout-zip" placeholder="1000" />
        </div>

        <div class="form-group">
          <label for="checkout-country">Country</label>
          <input type="text" id="checkout-country" placeholder="Philippines" value="Philippines" />
        </div>

        <button class="place-order-btn" id="place-order-btn">Place Order</button>
      </div>

      <!-- Right: Order Summary -->
      <aside class="checkout-summary">
        <h2>Order Summary</h2>
        <div class="checkout-items" id="checkout-items"></div>

        <div class="summary-row">
          <span>Subtotal</span>
          <span id="checkout-subtotal">₱0.00</span>
        </div>

        <div class="summary-row">
          <span>Shipping</span>
          <span>Free</span>
        </div>

        <div class="summary-total">
          <span>Total</span>
          <span id="checkout-total">₱0.00</span>
        </div>
      </aside>
    </main>

    <!-- Payment Method Section -->
    <section class="payment-section">
      <h3>Payment Method</h3>

      <label class="payment-option">
        <input type="radio" name="payment" value="Cash on Delivery" checked />
        <span>Cash on Delivery</span>
      </label>

      <label class="payment-option">
        <input type="radio" name="payment" value="GCash" />
        <span>GCash</span>
      </label>

      <label class="payment-option">
        <input type="radio" name="payment" value="Online Banking" />
        <span>Online Banking</span>
      </label>

      <label class="payment-option">
        <input type="radio" name="payment" value="ATM/Debit Card" />
        <span>ATM/Debit Card</span>
      </label>
    </section>

    <!-- Order Success Modal -->
    <div class="order-modal" id="order-modal">
      <div class="order-modal-box">
        <h2>🎉 Order Placed!</h2>
        <p>Your order has been successfully placed and is now <strong>Pending</strong>.</p>
        <div class="order-status">
          <div class="status-step active">Pending</div>
          <div class="status-step">On Delivery</div>
          <div class="status-step">Delivered</div>
        </div>
        <button class="continue-btn" id="continue-btn">Continue Shopping</button>
      </div>
    </div>

    <!------------------------- Footer Placeholder --------------------------->
    <div class="footer" id="footer-placeholder"></div>

    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/checkout.js"></script>
  </body>
</html>
