<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Listing</title>
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/shop.css">
</head>
<body>
    <!---------------------- Header Placeholder ---------------------->
    <div class="main-header" id="header-placeholder">
      
    </div>

    <main class="main-listing">
    
        <div class="main-listing-sidebar">

            <aside class="listing-sidebar">

                <div class="listing-sidebar-box1">
                    <h2>Categories</h2>
                </div>

                <div class="listing-sidebar-box2">
                    <ul>
                        <li><a href="#">BEST SELLER</a></li>
                        <li><a href="#">NEW ARRIVALS</a></li>
                        <li><a href="#">PRICE RANGE</a></li>
                    </ul>
                </div>
                
            </aside>
            
            <!--Listing 1-->
        
            <div class="main-listing-wrapper">
                <div id="product-grid">

                </div>
            </div>
        </div>

        

        <div class="main-listing-pagination-wrapper">
            <button class="move-page-left"> < </button>
            <span class="listing-pagination-number"> 1 / 5 </span>
            <button class="move-page-right"> > </button>
        </div>

    </main>

    <!------------------------- Footer Placeholder ------------------------->

    <div class="footer" id="footer-placeholder">
      
    </div>

    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/shop.js"></script>
    <script src="../assets/js/product.js"></script>
</body>
</html>
