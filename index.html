<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>

    <script src="https://cdn.lordicon.com/lordicon.js"></script>

    <link rel="stylesheet" href="assets/css/header.css" />
    <link rel="stylesheet" href="assets/css/footer.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <!---------------------- Header Placeholder ---------------------->
    
    <div class="main-header" id="header-placeholder">
      
    </div>

    <!--------------------------- Hero Section --------------------------->

    <section class="hero">
      <div class="hero-content">
        <span class="hero-badge">Back-to-School Sale</span>

        <h1>Your One-Stop <span class="hero-highlight">School Supply Shop</span></h1>

        <p class="hero-subhead">
          Stock up on everything students need, budget-friendly supplies
          that make learning easier and more fun.
        </p>

        <div class="hero-cta-group">
          <a href="shop.html" class="hero-btn-primary">Shop Now</a>
          <button class="hero-btn-secondary">See How</button>
        </div>
      </div>

      <div class="hero-image">
        <img src="assets/images/kids.png" alt="Students" />
      </div>
    </section>

    <!---------------------- Top Seller Section ---------------------->

    <section class="top-seller-section">
      <div class="top-seller-content">
        <div class="top-seller-card" id="top-seller-card">
          <!-- JS renders top seller here -->
        </div>
      </div>
    </section>

    <!---------------------- Featured Products Section ---------------------->

    <section class="featured-section">
      <div class="featured-header">
        <h2>Featured Products</h2>
      </div>

      <div class="featured-tabs">
        <button class="featured-tab active" data-category="Writing Tools">
          Writing Tools
        </button>
        <button class="featured-tab" data-category="Paper Products">
          Paper Products
        </button>
        <button class="featured-tab" data-category="Art & Creativity">
          Art & Creativity
        </button>
        <button class="featured-tab" data-category="Backpacks & Storage">
          Backpacks & Storage
        </button>
      </div>

      <div class="featured-grid" id="featured-grid"></div>
    </section>

    <!------------------------- Footer Placeholder ------------------------->

    <div class="footer" id="footer-placeholder">
      
    </div>

    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
